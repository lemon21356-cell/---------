<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 160px; padding: 15px; font-family: 'Malgun Gothic', sans-serif; background: #f9f9f9; }
    .title { font-size: 14px; font-weight: bold; margin-bottom: 12px; color: #333; text-align: center; }
    button { 
      width: 100%; background: #00bbff; color: white; border: none; 
      padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold;
      transition: background 0.2s;
    }
    button:hover { background: #009dd6; }
  </style>
</head>
<body>
  <div class="title">엔트리 도구</div>
  <button id="cleanBtn">미사용 블록 삭제</button>
  <script src="popup.js"></script>

</html>
